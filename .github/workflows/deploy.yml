name: Java Microservice CI/CD

on:
push:
branches:
- main

jobs:
build-and-deploy:
runs-on: ubuntu-latest

```
steps:

# 1. Checkout code
- name: Checkout Repository
  uses: actions/checkout@v3


# 2. Login to DockerHub
- name: Login to DockerHub
  uses: docker/login-action@v2
  with:
    username: ${{ secrets.DOCKER_USERNAME }}
    password: ${{ secrets.DOCKER_PASSWORD }}


# 3. Build Docker Image
- name: Build Docker Image
  run: |
    docker build -t sachin654321/cicd1:latest .


# 4. Push Docker Image to DockerHub
- name: Push Docker Image
  run: |
    docker push sachin654321/cicd1:latest


# 5. Deploy to EC2
- name: Deploy to EC2
  uses: appleboy/ssh-action@v0.1.7
  with:
    host: ${{ secrets.EC2_HOST }}
    username: ${{ secrets.EC2_USER }}
    key: ${{ secrets.EC2_KEY }}
    script: |
      
      echo "Stopping old container..."
      docker stop cicd1-container || true
      
      echo "Removing old container..."
      docker rm cicd1-container || true
      
      echo "Pulling latest image..."
      docker pull sachin654321/cicd1:latest
      
      echo "Starting new container..."
      docker run -d \
      --name cicd1-container \
      -p 80:8080 \
      sachin654321/cicd1:latest
      
      echo "Deployment completed!"
```
