name: CI-CD Deploy to EC2

on:
push:
branches:
- main

jobs:
build-deploy:
runs-on: ubuntu-latest

```
steps:

  - name: Checkout Code
    uses: actions/checkout@v3

  - name: Login DockerHub
    uses: docker/login-action@v2
    with:
      username: \${{ secrets.DOCKER_USERNAME }}
      password: \${{ secrets.DOCKER_PASSWORD }}

  - name: Build Docker Image
    run: docker build -t sachin654321/cicd1:latest .

  - name: Push Docker Image
    run: docker push sachin654321/cicd1:latest

  - name: Deploy to EC2
    uses: appleboy/ssh-action@v0.1.7
    with:
      host: \${{ secrets.EC2_HOST }}
      username: \${{ secrets.EC2_USER }}
      key: \${{ secrets.EC2_KEY }}
      script: |
        docker stop cicd1-container || true
        docker rm cicd1-container || true
        docker pull sachin654321/cicd1:latest
        docker run -d --name cicd1-container -p 80:8080 sachin654321/cicd1:latest
```
