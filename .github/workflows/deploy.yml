name: CI/CD Deploy to EC2

on:
  push:
    branches:
      - main  # triggers only on main branch pushes

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repo
      - name: Checkout code
        uses: actions/checkout@v3

      # 2️⃣ Set up Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      # 3️⃣ Login to Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 4️⃣ Build Docker image
      - name: Build Docker image
        run: docker build -t sachin654321/cicd1:latest .

      # 5️⃣ Push Docker image
      - name: Push Docker image
        run: docker push sachin654321/cicd1:latest

      # 6️⃣ Deploy to EC2
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            echo "Stopping old container if exists..."
            docker stop cicd1-container || true
            docker rm cicd1-container || true
            echo "Pulling latest Docker image..."
            docker pull sachin654321/cicd1:latest
            echo "Starting new container..."
            docker run -d --name cicd1-container -p 80:8080 sachin654321/cicd1:latest
            echo "Deployment finished successfully!"
