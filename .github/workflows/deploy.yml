name: CI-CD Deploy to EC2

on:
push:
branches:
- main

jobs:
build-deploy:
runs-on: ubuntu-latest

steps:

  # 1️⃣ Checkout source code
  - name: Checkout Code
    uses: actions/checkout@v3

  # 2️⃣ Cache Maven dependencies
  - name: Cache Maven dependencies
    uses: actions/cache@v3
    with:
      path: ~/.m2/repository
      key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
      restore-keys: |
        ${{ runner.os }}-maven-

  # 3️⃣ Login to DockerHub
  - name: Login DockerHub
    uses: docker/login-action@v2
    with:
      username: ${{ secrets.DOCKER_USERNAME }}
      password: ${{ secrets.DOCKER_PASSWORD }}

  # 4️⃣ Build Docker Image
  - name: Build Docker Image
    run: docker build -t sachin654321/cicd1:latest .

  # 5️⃣ Push Docker Image
  - name: Push Docker Image
    run: docker push sachin654321/cicd1:latest

  # 6️⃣ Deploy on EC2 via SSH
  - name: Deploy to EC2
    uses: appleboy/ssh-action@v0.1.7
    with:
      host: ${{ secrets.EC2_HOST }}
      username: ${{ secrets.EC2_USER }}
      key: ${{ secrets.EC2_KEY }}
      script: |
        echo "Pull latest docker image..."
        docker pull sachin654321/cicd1:latest

        echo "Create docker network..."
        docker network create weather-net || true

        echo "Stop old containers..."
        docker rm -f cicd1-container || true
        docker rm -f mysql-db || true

        echo "Start MySQL container..."
        docker run -d \
          --name mysql-db \
          --network weather-net \
          -e MYSQL_ROOT_PASSWORD=rootpassword \
          -e MYSQL_DATABASE=weatherdb \
          mysql:8

        echo "Start Spring Boot container..."
        docker run -d \
          --name cicd1-container \
          --network weather-net \
          -p 80:8080 \
          sachin654321/cicd1:latest

        echo "Deployment completed"
