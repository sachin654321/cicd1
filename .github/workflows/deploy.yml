name: CI/CD Deploy to EC2

on:
push:
branches:
- main

jobs:
build-and-deploy:
runs-on: ubuntu-latest

```
steps:

  # 1️⃣ Checkout repository
  - name: Checkout Code
    uses: actions/checkout@v3


  # 2️⃣ Set up Docker Buildx
  - name: Set up Docker Buildx
    uses: docker/setup-buildx-action@v3


  # 3️⃣ Login to DockerHub
  - name: Login to DockerHub
    uses: docker/login-action@v3
    with:
      username: ${{ secrets.DOCKER_USERNAME }}
      password: ${{ secrets.DOCKER_PASSWORD }}


  # 4️⃣ Build Docker Image
  - name: Build Docker Image
    run: |
      docker build -t sachin654321/cicd1:latest .


  # 5️⃣ Push Docker Image
  - name: Push Docker Image
    run: |
      docker push sachin654321/cicd1:latest


  # 6️⃣ Deploy to EC2
  - name: Deploy to EC2 Server
    uses: appleboy/ssh-action@v1.0.3
    with:
      host: ${{ secrets.EC2_HOST }}
      username: ${{ secrets.EC2_USER }}
      key: ${{ secrets.EC2_KEY }}
      script: |

        echo "Stopping old container..."
        docker stop cicd1-container || true
        docker rm cicd1-container || true

        echo "Removing old image..."
        docker rmi sachin654321/cicd1:latest || true

        echo "Pulling latest image..."
        docker pull sachin654321/cicd1:latest

        echo "Starting new container..."
        docker run -d \
          --name cicd1-container \
          -p 80:8080 \
          --restart always \
          sachin654321/cicd1:latest

        echo "Deployment Successful!"
```
