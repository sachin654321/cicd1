name: CI/CD Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build Docker image
      run: docker build -t sachin654321/cicd1:latest .

    - name: Push Docker image
      run: docker push sachin654321/cicd1:latest

    - name: Deploy to EC2
      uses: appleboy/ssh-action@v0.1.7
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_KEY }}
        script: |
          docker pull sachin654321/cicd1:latest
          docker stop $(docker ps -q --filter ancestor=sachin654321/cicd1:latest) || true
          docker rm $(docker ps -a -q --filter ancestor=sachin654321/cicd1:latest) || true
          docker run -d -p 80:8080 sachin654321/cicd1:latest
